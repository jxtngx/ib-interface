name: Feature Request
description: Request a new feature or enhancement
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit
        
        Please read the [Support Model](https://github.com/jxtngx/ib-interface#support-model) section of the README.
        
        - This is an open-source project, not a product
        - Feature requests are not guaranteed to be implemented
        - Consider [sponsoring the project](https://github.com/jxtngx/ib-interface#feature-requests) to prioritize your feature
        
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Describe the feature as a user story
      placeholder: |
        As a [type of user],
        I want [some goal or objective]
        so that [some reason or benefit].
      value: |
        As a 
        I want 
        so that 
    validations:
      required: true
      
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define specific, testable conditions that must be met for this feature to be considered complete
      placeholder: |
        - [ ] Given [context], when [action], then [expected outcome]
        - [ ] The feature must [specific requirement]
        - [ ] The system should [observable behavior]
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
      
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional information, constraints, or technical details
      placeholder: |
        - Current behavior vs desired behavior
        - Technical constraints or dependencies
        - Relevant TWS/Gateway version requirements
        - Related issues or discussions
    validations:
      required: false
      
  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgment
      description: Please confirm you understand the project's support model
      options:
        - label: I understand this is an open-source project with no guaranteed timelines or implementation commitments
          required: true
        - label: I have read the README and understand that sponsorship helps prioritize features
          required: true
